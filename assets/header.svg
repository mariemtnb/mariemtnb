<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a1f3d"/>
      <stop offset="45%" stop-color="#3a2a52"/>
      <stop offset="100%" stop-color="#4a2f4f"/>
    </linearGradient>

    <linearGradient id="glowA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5C2E7" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#F5C2E7" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="glowB" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#CBA6F7" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#CBA6F7" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="glassFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.03"/>
    </linearGradient>

    <linearGradient id="glassStroke" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.08"/>
    </linearGradient>

    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F9E2F5"/>
      <stop offset="50%" stop-color="#F5C2E7"/>
      <stop offset="100%" stop-color="#D9BCFA"/>
    </linearGradient>

    <filter id="blurSoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>

    <filter id="glassBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.4"/>
    </filter>

    <clipPath id="frameClip">
      <rect x="0" y="0" width="900" height="200" rx="24"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frameClip)">
    <rect width="900" height="200" fill="url(#bgGrad)"/>

    <circle cx="120" cy="40" r="130" fill="url(#glowA)" filter="url(#blurSoft)"/>
    <circle cx="800" cy="170" r="150" fill="url(#glowB)" filter="url(#blurSoft)"/>
    <circle cx="480" cy="230" r="120" fill="url(#glowA)" filter="url(#blurSoft)" opacity="0.5"/>

    <g opacity="0.85">
      <path d="M64 36 l3.4 8.6 8.6 3.4 -8.6 3.4 -3.4 8.6 -3.4 -8.6 -8.6 -3.4 8.6 -3.4 z" fill="#ffffff" opacity="0.8"/>
      <path d="M838 44 l2.6 6.4 6.4 2.6 -6.4 2.6 -2.6 6.4 -2.6 -6.4 -6.4 -2.6 6.4 -2.6 z" fill="#ffffff" opacity="0.7"/>
      <path d="M818 150 l3 7.4 7.4 3 -7.4 3 -3 7.4 -3 -7.4 -7.4 -3 7.4 -3 z" fill="#ffffff" opacity="0.6"/>
      <circle cx="150" cy="150" r="2.4" fill="#ffffff" opacity="0.7"/>
      <circle cx="90" cy="120" r="1.8" fill="#ffffff" opacity="0.6"/>
      <circle cx="770" cy="60" r="2" fill="#ffffff" opacity="0.6"/>
      <circle cx="70" cy="70" r="1.6" fill="#ffffff" opacity="0.55"/>
    </g>

    <g filter="url(#glassBlur)">
      <rect x="150" y="60" width="600" height="86" rx="26" fill="url(#glassFill)" stroke="url(#glassStroke)" stroke-width="1.2"/>
      <path d="M158 62 h584 a24 24 0 0 1 24 24 v6 h-632 v-6 a24 24 0 0 1 24 -24 z" fill="#ffffff" opacity="0.10"/>
    </g>

    <text x="450" y="102" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="600" fill="url(#textGrad)" letter-spacing="0.5">Mariem Tanabene</text>
    <text x="450" y="130" text-anchor="middle" font-family="Verdana, Arial, sans-serif" font-size="13.5" fill="#EADCF5" letter-spacing="1.2" opacity="0.9">SOFTWARE ENGINEER &#8226; AI &amp; DATA ENTHUSIAST</text>

    <rect x="0" y="196" width="900" height="4" fill="url(#textGrad)" opacity="0.6"/>
  </g>
</svg>
